# Docker Compose for MCP Server Stack
# Orchestrates multiple MCP servers including Steam Analytics

services:
  # Steam Analytics MCP Server
  steam-mcp:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: steam-analytics-mcp
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - STEAM_API_KEY=${STEAM_API_KEY}
      - STEAM_RATE_LIMIT=${STEAM_RATE_LIMIT:-100}
      - STEAM_BURST_LIMIT=${STEAM_BURST_LIMIT:-10}
    volumes:
      - ./logs:/app/logs:rw
      - ./config:/app/config:ro
    restart: unless-stopped
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "mcp.service=steam-analytics"
      - "mcp.version=1.0.0"
      - "monitoring.container_group=mcp"
      - "monitoring.service_name=steam-analytics"
      - "monitoring.service_type=mcp-server"
      - "prometheus.scrape=true"

  # MCP Gateway/Orchestrator
  mcp-gateway:
    image: nginx:alpine
    container_name: mcp-gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs:/var/log/nginx:rw
    restart: unless-stopped
    networks:
      - mcp-network
    labels:
      - "mcp.service=gateway"
      - "monitoring.container_group=mcp"
      - "monitoring.service_name=gateway"
      - "monitoring.service_type=proxy"
      - "prometheus.scrape=true"

  # Container monitoring
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: mcp-cadvisor
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    restart: unless-stopped
    networks:
      - mcp-network
    labels:
      - "monitoring.container_group=monitoring"
      - "monitoring.service_name=cadvisor"
      - "monitoring.service_type=metrics-collector"
      - "prometheus.scrape=true"

  # System monitoring
  node-exporter:
    image: prom/node-exporter:latest
    container_name: mcp-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    networks:
      - mcp-network
    labels:
      - "monitoring.container_group=monitoring"
      - "monitoring.service_name=node-exporter"
      - "monitoring.service_type=system-metrics"
      - "prometheus.scrape=true"

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: mcp-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - mcp-network
    depends_on:
      - cadvisor
      - node-exporter
    labels:
      - "monitoring.container_group=monitoring"
      - "monitoring.service_name=prometheus"
      - "monitoring.service_type=metrics-storage"
      - "prometheus.scrape=false"

  # Grafana with provisioning
  grafana:
    image: grafana/grafana:latest
    container_name: mcp-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped
    networks:
      - mcp-network
    depends_on:
      - prometheus
    labels:
      - "monitoring.container_group=monitoring"
      - "monitoring.service_name=grafana"
      - "monitoring.service_type=dashboard"
      - "prometheus.scrape=false"

  # Nginx Prometheus Exporter
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: mcp-nginx-exporter
    ports:
      - "9113:9113"
    command:
      - '-nginx.scrape-uri=http://mcp-gateway:80/nginx_status'
    depends_on:
      - mcp-gateway
    restart: unless-stopped
    networks:
      - mcp-network
    labels:
      - "monitoring.container_group=monitoring"
      - "monitoring.service_name=nginx-exporter"
      - "monitoring.service_type=metrics-exporter"
      - "prometheus.scrape=true"

networks:
  mcp-network:
    driver: bridge
    name: mcp-network

volumes:
  prometheus_data:
    name: mcp-prometheus-data
  grafana_data:
    name: mcp-grafana-data