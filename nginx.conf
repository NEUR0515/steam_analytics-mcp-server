# ================================
# nginx.conf (Gateway configuration)
# ================================

events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name localhost;
        
        # Health endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # Nginx status endpoint for Prometheus
        location /nginx_status {
            stub_status on;
            access_log off;
            allow all;  # In production, restrict this
        }
        
        # Basic status
        location /status {
            access_log off;
            return 200 "nginx running\n";
            add_header Content-Type text/plain;
        }
        
        # Main endpoint
        location / {
            return 200 "MCP Gateway Running\n";
            add_header Content-Type text/plain;
        }
    }
}